    material: REDSTONE
    slot: 49
    display_name: '%imc_dark-color_c%Voltar'
    click_commands:
      - '[openguimenu] jobs_skilltree_explorer_1'
      - '[sound] UI_BUTTON_CLICK'
  background:
    material: CYAN_STAINED_GLASS_PANE
    display_name: '&l'
    slots:
      - 0
      - 1
      - 7
      - 8
      - 45
      - 46
      - 52
      - 53
