menu_title: Jobs | Minerador
open_command:
  - jobs skilltree miner
  - jobs miner
register_command: true
size: 54
items:
  payouts:
    material: RAW_GOLD
    slot: 5
    item_flags:
      - HIDE_ENCHANTS
      - HIDE_ATTRIBUTES
    display_name: '&eAções pagas'
    lore:
      - '%imc_dark-color_c%Encontre todas as ações que pode'
      - '%imc_dark-color_c%executar para ser pago através'
      - '%imc_dark-color_c%deste trabalho.'
      - ''
      - '%imc_darkest-color_c%Ações Pagas:'
      - '%imc_dark-color_c% • %imc_text-color_c%Quebrar'
      - '%imc_dark-color_c% • %imc_text-color_c%Detonar TNT'
      - '%imc_dark-color_c% • %imc_text-color_c%Colocar'
      - ''
      - '%imc_dark-color_c%◆ %imc_primary-color_c%Clicar:%imc_text-color_c% Obter informações de pagamentos'
    click_commands:
      - '[openguimenu] jobs_payouts_miner_break'
      - '[sound] UI_BUTTON_CLICK'
  information_joined:
    material: DIAMOND_PICKAXE
    slot: 4
    priority: 1
    dynamic_amount: '%jobsr_user_jlevel_miner%'
    view_requirement:
      requirements:
        joined:
          type: string contains
          input: '%jobsr_user_isin_miner%'
          output: 'True'
    enchantment_glint_override: true
    item_flags:
      - HIDE_ENCHANTS
      - HIDE_ATTRIBUTES
    display_name: '&bMinerador %imc_f_latin_{jobsr_user_jlevel_miner}%'
    lore:
      - '%imc_darkest-color_c%Status: &a Trabalhando'
      - '%imc_darkest-color_c%Empregados: %imc_secondary-color_c%%jobsr_totalplayers_miner%'
      - ''
      - '%imc_dark-color_c%Escave através das profundezas para'
      - '%imc_dark-color_c%descobrir recursos valiosos.'
      - ''
      - '%imc_darkest-color_c%Estatísticas:'
      - '%imc_dark-color_c% • %imc_text-color_c%Nível: %imc_primary-color_c%%jobsr_user_jlevel_miner%%imc_dark-color_c%/%jobsr_user_jmaxlvl_miner%'
