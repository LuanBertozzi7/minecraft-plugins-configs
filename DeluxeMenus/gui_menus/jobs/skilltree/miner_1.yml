      - ' %imc_job-progress_{jobsr_user_jexpunf_miner}_{jobsr_user_jmaxexpunf_miner}%'
      - ''
      - '%imc_dark-color_c%◆ %imc_primary-color_c%Clicar:%imc_text-color_c% Sair'
    click_commands:
      - '[player] jobs leave miner'
      - '[sound] BLOCK_COMPOSTER_FILL'
      - '[refresh]'
