size: 54
items:
  
##################################
#                                #
#          WOODCUTTER            #    
#                                #
##################################
  woodcutter_joined:
    material: GOLDEN_AXE
    slot: 20
    priority: 1
    dynamic_amount: "%jobsr_user_jlevel_woodcutter%"
    view_requirement:
      requirements:
        joined:
          type: string contains
          input: "%jobsr_user_isin_woodcutter%"
          output: "True"
    enchantment_glint_override: true
    item_flags: [HIDE_ENCHANTS, HIDE_ATTRIBUTES]
    display_name: "&aLenhador %imc_f_latin_{jobsr_user_jlevel_woodcutter}%"
    lore:
      - '%imc_darkest-color_c%Status: &a Trabalhando'
      - '%imc_darkest-color_c%Empregados: %imc_secondary-color_c%%jobsr_totalplayers_woodcutter%'
      - ''
      - '%imc_dark-color_c%Corte árvores e colha madeira'
      - '%imc_dark-color_c%de forma eficiente.'
      - ''
      - '%imc_darkest-color_c%Ações Pagas:'
      - "%imc_dark-color_c% • %imc_text-color_c%Quebrar"
      - ''
      - "%imc_dark-color_c%◆ %imc_primary-color_c%Clicar:%imc_text-color_c% Mais informações"
      - "%imc_dark-color_c%◆ %imc_primary-color_c%Shift Clicar:%imc_text-color_c% Sair"
    shift_right_click_commands:
      - '[player] jobs leave woodcutter'
      - '[sound] BLOCK_COMPOSTER_FILL'
      - '[refresh]'
    shift_left_click_commands:
      - '[player] jobs leave woodcutter'
      - '[sound] BLOCK_COMPOSTER_FILL'
      - '[refresh]'
    right_click_commands:
      - '[openguimenu] jobs_skilltree_woodcutter_1'
      - '[sound] UI_BUTTON_CLICK'
    left_click_commands:
      - '[openguimenu] jobs_skilltree_woodcutter_1'
      - '[sound] UI_BUTTON_CLICK'

  woodcutter_maxjobs:
    material: GOLDEN_AXE
    slot: 20
    priority: 2
    view_requirement:
      requirements:
        maxjobs:
          type: "=="
          input: "%jobsr_user_joinedjobcount%"
          output: "%jobsr_maxjobs%"
    item_flags: [HIDE_ENCHANTS, HIDE_ATTRIBUTES]
    display_name: "&aLenhador"
    lore:
      - '%imc_darkest-color_c%Status: &e Desempregado'
      - '%imc_darkest-color_c%Empregados: %imc_secondary-color_c%%jobsr_totalplayers_woodcutter%'
      - ''
      - '%imc_dark-color_c%Corte árvores e colha madeira'
      - '%imc_dark-color_c%de forma eficiente.'
      - ''
      - '%imc_darkest-color_c%Ações Pagas:'
      - "%imc_dark-color_c% • %imc_text-color_c%Quebrar"
      - ''
      - '&c✘ Você só pode ter %jobsr_maxjobs% empregos.'
      - ''
      - "%imc_dark-color_c%◆ %imc_primary-color_c%Clicar:%imc_text-color_c% Mais informações"
    right_click_commands:
      - '[openguimenu] jobs_skilltree_woodcutter_1'
      - '[sound] UI_BUTTON_CLICK'
    left_click_commands:
      - '[openguimenu] jobs_skilltree_woodcutter_1'
      - '[sound] UI_BUTTON_CLICK'

