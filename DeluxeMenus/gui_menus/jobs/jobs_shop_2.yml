menu_title: 'Jobs | Loja de Pontos'
size: 54
items:
  information:
    material: SUNFLOWER
    slot: 4
    display_name: "%imc_primary-color_c%Informação"
    item_flags: [HIDE_ATTRIBUTES]
    lore:
      - "%imc_dark-color_c%Ganhe %imc_job-point-format_c% Pontos %%imc_dark-color_c% realizando ações pagas"
      - "%imc_dark-color_c%para seu trabalho ou subindo de nível."
      - ''
      - '%imc_text-color_c%Pontos: %imc_job-point-format_c_{jobsr_user_points_fixed}%'
      - ''
      - "%imc_darkest-color_c%Para que é usado este dinheiro?"
      - "%imc_job-point-format_c% permite que você compre"
      - "%imc_dark-color_c%diversos itens nesta loja."
      - ''
      - '%imc_darkest-color_c%Estatísticas:'
      - "%imc_dark-color_c% • %imc_text-color_c%Pontos coletados de todos os tempos: %imc_job-point-format_c_{jobsr_user_total_points}%"

################## SHOP ITEMS

##################################
#            IRON INGOT          #
##################################

  iron_ingot_lock:
    material: IRON_INGOT
    slot: 19
    amount: 48
    priority: 0
    display_name: "%imc_dark-color_c%x48 %imc_primary-color_c%Barra de ferro"
    item_flags: [HIDE_ATTRIBUTES]
    lore:
      - '%imc_dark-color_c%Compre itens usando seus pontos'
      - ''
      - '%imc_text-color_c%Preço: %imc_job-point-format_c_500 Pontos %'
      - ''
      - "&c✘ Você não tem pontos suficientes."
    view_requirement:
      requirements:
        balance:
          type: '<'
          input: '%jobsr_user_points_fixed%'
          output: 500
    click_commands:
      - "[message] $<p:error-prefix> Você não tem pontos suficientes."

  iron_ingot_available:
    material: IRON_INGOT
    slot: 19
    amount: 48
    priority: 1
    display_name: "%imc_dark-color_c%x48 %imc_primary-color_c%Barra de ferro"
    item_flags: [HIDE_ATTRIBUTES]
    lore:
      - '%imc_dark-color_c%Compre itens usando seus pontos'
      - ''
      - '%imc_text-color_c%Preço: %imc_job-point-format_c_500 Pontos %'
      - ''
      - "%imc_dark-color_c%◆ %imc_primary-color_c%Clicar:%imc_text-color_c% Comprar"
    click_requirement:
      requirements:
        balance:
          type: '>='
          input: '%jobsr_user_points_fixed%'
          output: 500
      deny_commands:
        - "[message] $<p:error-prefix> Você não tem pontos suficientes."
    click_commands:
      - '[console] jobs editpoints take %player_name% 500'
      - '[sound] BLOCK_DECORATED_POT_INSERT'
      - '[console] minecraft:give %player_name% iron_ingot 48'
      - "[message] $<p:prefix> Você comprou com sucesso <p:dark-color>x48</p> <p:primary-color>Barra de ferro"
      - '[refresh]'

