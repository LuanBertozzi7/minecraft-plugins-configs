# Recipes can be stored to a player via 2 methods:
# LuckPerms, Command
# When using LUCKPERMS, Recipes will use LuckPerms' API to set the permission node
# When using COMMAND, Recipes will run the command specified in the command field
recipe-saving-method: COMMAND

# The command to run when using COMMAND as the recipe-saving-method
# PLACEHOLDERS: %player% - The player's name
#               %permission% - The permission node
#               %boolean% - The boolean value of what the permission is being set to
permission-command: lp user %player% permission set %permission% %boolean%
permission-unset-command: lp user %player% permission unset %permission%

# PLACEHOLDERS: %recipe% - The recipe's key in the config with spaces replaced as underscores "_"
recipe-permission-node: brewery.recipesaddon.recipe.%recipe%

# If true, the player will automatically learn the recipe when they create it for the first time
# Either by brewing the recipe or by receiving the brew via command
learn-recipe-upon-creation: false

# Recipes spawn in loot chests randomly throughout the world
# Disable this by setting your chance to -1
recipe-spawning:
  # The highest value that the random number can generate to. Ex: 100 means a random number between 0 and 100
  bound: 100
  # The chance that a recipe will spawn in a loot chest
  chance: 15
  # A list of recipes that will not spawn in loot chests
  blacklisted-recipes:
  - ex
recipe-book-item:
  material: BOOK
  display_name: '&6&lLivro de Receitas'
  lore:
  - '&7clique direito para ler...'
  - '&7seu Livro de Receitas!'
  glint: true

# The physical recipe item that will spawn in loot chests
# PLACEHOLDERS: %recipe% - The recipe's name
recipe-item:
  material: PAPER
  display_name: '&#F7FFC9%recipe% &fReceita'
  lore:
  - '&7Clique-Direito para resgatar'
  - '&7essa Bebida!'
  glint: true

# Full example Gui Border Item
# item:
#   material: SHORT_GRASS
#   slots: [ 0 ]
#   display_name: 'example item'
#   lore: [ 'example lore', 'another line' ]
#   glint: true
#   custom_model_data: -1
gui:
  title: '&#f670f1&lR&#dd7af6&le&#c584fa&lc&#ac8eff&li&#9c92ff&lp&#8d96ff&le&#7d9aff&ls'
  size: 54
  
  # Determines how recipes are sorted in the Gui
  # When using ALPHABETICAL, recipes are sorted by their name alphabetically, case insensitive
  # When using DEFINITION, recipes are sorted in the same order they are defined in recipes.yml
  sort-method: ALPHABETICAL
  
  # Determines how recipes a player does not know are sorted in the Gui
  # When using KNOWN_FIRST, known recipes are shown first
  # When using MIXED, known and unknown recipes are sorted together
  # When using UNKNOWN_FIRST, unknown recipes are shown first
  # The unknown-recipe item must not be AIR for unknown recipes to show up in the Gui
  unknown-recipe-sort-method: MIXED
  items:
    
    # The item that will be used to show all the recipes the player has
    # When material is set to POTION material the RGB/Color specified for the potion in the config will be used
    # PLACEHOLDERS: %recipe% - The recipe's name
    #                %difficulty% - The difficulty of the recipe
    #                %cooking_time% - The cooking time of the recipe
    #                %distill_runs% - The distill runs of the recipe
    #                %age% - The age of the recipe
    #                %barrel_type% - The barrel wood type of the recipe
    #                %ingredients% - The ingredients of the recipe using the ingredient-format
    recipe-gui-item:
      
      # The format for the ingredients
      # PLACEHOLDERS: %amount% - The amount of the ingredient
      #                %ingredient% - The ingredient's name
      ingredient-format: ' &#F7FFC9%amount%x &f%ingredient%'
      material: POTION
      slots:
      - 19
      - 20
      - 21
      - 22
      - 23
      - 24
      - 25
      - 28
      - 29
      - 30
      - 31
      - 32
      - 33
      - 34
      display_name: '&#F7FFC9%recipe%'
      lore:
      - '&7Dificuldade&7: &#F7FFC9%difficulty%'
      - '&fTempo de cozimento&7: &#F7FFC9%cooking_time% Minutos'
      - '&7Destilação&7: &#F7FFC9%distill_runs%'
      - '&fIdade&7: &#F7FFC9%age% Anos &f(1 ano = 1 dia no minecraft)'
      - '&fTipo de barril&7: &#F7FFC9%barrel_type%'
      - ''
      - '&7%lore%'
      - ''
      - '&fIngredientes&7:'
      - '%ingredients%'
      glint: true
      # If true, the custom model data will be set to the recipe's custom model data
      use-recipe-custom-model-data: false
    
    # The item shown when a player does not know a recipe
    # Supports the same placeholders as recipe-gui-item
    unknown-recipe:
      
      # The format for the ingredients
      ingredient-format: ' &#F7FFC9%amount%x &f%ingredientes%'
      # Set to AIR to disable completely and only have *known* recipes show up
      material: AIR
      display_name: '&#f498f6??? Receita'
      lore:
      - '&7Opa! você ainda não conhece a receita dessa cachaça...'
      glint: false
      # If true, the custom model data will be set to the recipe's custom model data
      use-recipe-custom-model-data: false
    
    # PLACEHOLDERS: %total_recipes% - The total amount of recipes the player has out of the total recipes in Brewery's config
    total_recipes:
      material: BOOK
      slots:
      - 49
      display_name: '&#f498f6Total de receitas&7: &e%total_recipes%'
      glint: true
    next_page:
      material: ARROW
      slots:
      - 50
      display_name: '&#f498f6Próxima Página'
    previous_page:
      material: ARROW
      slots:
      - 48
      display_name: '&#f498f6Página anterior'
    
    # Border items
    border-items:
